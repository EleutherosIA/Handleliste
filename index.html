<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS Web App Innstillinger -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Min Liste">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3737/3737372.png">

    <title>Smart Handleliste - Long Press Edit</title>
    
    <style>
        /* Fargetemaer */
        :root {
            --bg: #f9f7f2;
            --card: #ffffff;
            --text: #2c2c2c;
            --secondary-text: #7c7c7c;
            --primary: #4a7c59; 
            --red: #d9534f;
            --divider: #e8e4d9;
            --input-bg: #f0ede4;
            --overlay: rgba(0,0,0,0.4);
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2c2c2c;
            --text: #f0f0f0;
            --secondary-text: #a0a0a0;
            --primary: #6ab04c;
            --red: #ff5e57;
            --divider: #3d3d3d;
            --input-bg: #3d3d3d;
            --overlay: rgba(0,0,0,0.6);
        }

        [data-theme="pink"] {
            --bg: #fff0f5;
            --card: #ffffff;
            --text: #5d3f4b;
            --secondary-text: #a0818f;
            --primary: #d63384;
            --red: #ff4d6d;
            --divider: #f8d7da;
            --input-bg: #ffe4ed;
            --overlay: rgba(80,0,40,0.3);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            color: var(--text);
            transition: background-color 0.3s ease;
        }

        header { 
            background: var(--card); 
            padding-top: env(safe-area-inset-top, 20px);
            padding-left: 15px; padding-right: 15px; padding-bottom: 12px;
            border-bottom: 1px solid var(--divider); 
            display: flex; justify-content: space-between; align-items: center; 
            flex-shrink: 0;
            z-index: 30;
        }

        .top-controls { 
            background: var(--card); 
            padding: 10px 12px; 
            border-bottom: 1px solid var(--divider); 
            display: flex; flex-direction: column; gap: 8px; 
            z-index: 30;
        }

        .input-group { display: flex; gap: 6px; position: relative; }

        input, select { 
            padding: 10px 12px; border-radius: 12px; border: none; 
            background: var(--input-bg); font-size: 14px; color: var(--text);
            outline: none;
        }

        input { flex: 1; }

        .category-select-mini {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            background: var(--input-bg);
            border: 1px solid var(--divider);
            color: var(--secondary-text);
            margin-bottom: 4px;
        }

        .search-container { position: relative; display: flex; align-items: center; }
        
        .clear-btn {
            position: absolute;
            right: 12px;
            font-size: 14px;
            color: var(--secondary-text);
            cursor: pointer;
            display: none; 
            padding: 5px;
            user-select: none;
        }

        .add-btn { 
            background: var(--primary); color: white; border: none; 
            border-radius: 12px; padding: 0 15px; font-weight: 600; font-size: 13px;
        }

        main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 12px; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 100px; 
        }

        h2 { 
            font-size: 11px; color: var(--secondary-text); text-transform: uppercase; 
            letter-spacing: 0.8px; margin: 12px 0 6px 4px; 
        }

        .category-header {
            font-size: 10px;
            font-weight: 700;
            color: var(--primary);
            padding: 8px 12px 4px 12px;
            background: var(--bg);
            text-transform: uppercase;
        }

        .list-container { 
            background: var(--card); border-radius: 14px; overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 15px;
        }

        .swipe-container {
            position: relative;
            background-color: var(--red);
            overflow: hidden;
            user-select: none;
            touch-action: pan-y;
            border-bottom: 0.5px solid var(--divider);
        }

        .swipe-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--card);
            font-size: 14px;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease-out;
        }

        .delete-btn-ios {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background-color: var(--red);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            z-index: 1;
        }

        .item-active { color: var(--primary); font-weight: 600; }

        .qty-input {
            width: 75px;
            padding: 6px 4px;
            border-radius: 8px;
            border: 1px solid var(--divider);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            text-align: center;
            margin-right: 4px;
            font-weight: 500;
        }

        #libraryList {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
            background: var(--divider); border: 0.5px solid var(--divider);
        }

        nav { 
            background: var(--card); 
            border-top: 1px solid var(--divider); 
            display: flex; 
            justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom, 15px); 
            padding-top: 10px;
            z-index: 40;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
        }

        .nav-btn { 
            border: none; background: none; font-size: 9px; color: var(--secondary-text); 
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; 
        }

        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 20px; }

        /* Dialoger / Modaler */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cat-option {
            padding: 12px;
            border-bottom: 1px solid var(--divider);
            font-size: 14px;
            text-align: center;
            cursor: pointer;
        }
        .cat-option:last-child { border-bottom: none; }
        .cat-option:active { background: var(--input-bg); }

        #admin-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: var(--bg); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            padding: 20px; box-sizing: border-box; z-index: 100; 
            border-top: 1px solid var(--divider); border-radius: 20px 20px 0 0; 
            display: flex; flex-direction: column;
        }
        #admin-panel.open { bottom: 0; }

        textarea { 
            width: 100%; flex: 1; margin-bottom: 15px; padding: 15px; border: none; 
            border-radius: 14px; font-size: 14px; background: var(--card); color: var(--text);
        }

        .btn { padding: 15px; border-radius: 14px; border: none; width: 100%; font-weight: 600; font-size: 15px; cursor: pointer; margin-bottom: 10px;}
        .vask-btn { background: var(--primary); color: white; }
        .lukk-btn { background: var(--divider); color: var(--text); }
    </style>
</head>
<body data-theme="classic">

<header>
    <h1 id="title" style="margin:0; font-size: 18px; font-weight: 800; letter-spacing: -0.5px;">Handling 🛒</h1>
    <div onclick="toggleAdmin()" style="font-size: 22px; cursor: pointer;">🎨</div>
</header>

<div class="top-controls">
    <div id="add-section">
        <div class="input-group">
            <input type="text" id="newItemInput" placeholder="Hva mangler?" onkeypress="handleKeyPress(event)" oninput="suggestCategory()" inputmode="text">
            <button class="add-btn" onclick="leggTilNyVare()">Legg til</button>
        </div>
        <div id="category-selector-container" style="display:none; margin-top: 4px;">
            <select id="newCategorySelect" class="category-select-mini">
                <!-- Fylles av JS -->
            </select>
            <span style="font-size: 10px; color: var(--secondary-text); margin-left: 5px;">Kategori</span>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Søk i bibliotek..." onkeyup="handleSearchInput(event)" inputmode="search">
        <span id="clearSearch" class="clear-btn" onclick="clearSearchInput()">✕</span>
    </div>
</div>

<main id="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="active-list-header">Dette skal vi ha</h2>
        <button onclick="clearActiveList()" style="background:none; border:none; color:var(--red); font-size: 10px; cursor:pointer;">Tøm fane</button>
    </div>
    <div id="activeList" class="list-container"></div>
    
    <h2>Bibliotek (hold inne for kategori)</h2>
    <div id="libraryList" class="list-container"></div>
</main>

<!-- Kategorivelger Modal -->
<div id="catModal" class="modal-overlay" onclick="closeCatModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; font-size: 16px; text-align: center;">Velg kategori</h3>
        <div id="modalCatList"></div>
        <button class="btn lukk-btn" style="margin-top:10px; padding:10px;" onclick="closeCatModal()">Avbryt</button>
    </div>
</div>

<nav>
    <button id="btn-handling" class="nav-btn active" onclick="switchTab('handling')">
        <span class="nav-icon">🛒</span><span>Handle</span>
    </button>
    <button id="btn-frys" class="nav-btn" onclick="switchTab('frys')">
        <span class="nav-icon">❄️</span><span>Frys</span>
    </button>
    <button id="btn-kontor" class="nav-btn" onclick="switchTab('kontor')">
        <span class="nav-icon">📎</span><span>Kontor</span>
    </button>
    <button id="btn-diverse" class="nav-btn" onclick="switchTab('diverse')">
        <span class="nav-icon">🛍️</span><span>Diverse</span>
    </button>
</nav>

<div id="admin-panel">
    <h3 style="margin-top:0; font-size: 18px;">Velg tema</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <div style="width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; background: #4a7c59;" onclick="setTheme('classic')"></div>
        <div style="width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; background: #2c2c2c;" onclick="setTheme('dark')"></div>
        <div style="width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; background: #d63384;" onclick="setTheme('pink')"></div>
    </div>

    <h3 style="font-size: 18px;">Rediger bibliotek manuelt</h3>
    <textarea id="importArea"></textarea>
    <div class="btn-group">
        <button class="btn vask-btn" onclick="importerListe()">Lagre endringer</button>
        <button class="btn lukk-btn" onclick="toggleAdmin()">Ferdig</button>
    </div>
</div>

<script>
    let currentTab = 'handling';
    let database = JSON.parse(localStorage.getItem('sh_database')) || { hjem: [], frys: [], kontor: [], diverse: [] };
    let activeItems = JSON.parse(localStorage.getItem('sh_active')) || { handling: [], frys: [], kontor: [], diverse: [] };
    let currentTheme = localStorage.getItem('sh_theme') || 'classic';

    const kategorier = ["Frukt & Grønt", "Kjøtt & Fisk", "Meieriprodukter", "Drikke", "Bakevarer", "Hermetikk & Tørrvarer", "Frysevarer", "Diverse"];

    const kategoriMap = {
        "melk": "Meieriprodukter", "ost": "Meieriprodukter", "smør": "Meieriprodukter", "yoghurt": "Meieriprodukter",
        "eple": "Frukt & Grønt", "banan": "Frukt & Grønt", "agurk": "Frukt & Grønt",
        "brød": "Bakevarer", "kjøttdeig": "Kjøtt & Fisk", "kylling": "Kjøtt & Fisk",
        "brus": "Drikke", "pasta": "Hermetikk & Tørrvarer"
    };

    function init() {
        const catSelect = document.getElementById('newCategorySelect');
        catSelect.innerHTML = "";
        kategorier.forEach(cat => {
            let opt = document.createElement('option');
            opt.value = cat; opt.innerHTML = cat;
            catSelect.appendChild(opt);
        });

        const modalCatList = document.getElementById('modalCatList');
        modalCatList.innerHTML = "";
        kategorier.forEach(cat => {
            let div = document.createElement('div');
            div.className = 'cat-option';
            div.innerText = cat;
            div.onclick = () => updateItemCategory(cat);
            modalCatList.appendChild(div);
        });

        setTheme(currentTheme);
        render();
    }

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        currentTheme = theme;
        localStorage.setItem('sh_theme', theme);
    }

    function saveData() {
        localStorage.setItem('sh_database', JSON.stringify(database));
        localStorage.setItem('sh_active', JSON.stringify(activeItems));
    }

    function getDbKey() {
        if (currentTab === 'frys') return 'frys';
        if (currentTab === 'kontor') return 'kontor';
        if (currentTab === 'diverse') return 'diverse';
        return 'hjem';
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        const emojis = { handling: '🛒', frys: '❄️', kontor: '📎', diverse: '🛍️' };
        const titles = { handling: 'Handling', frys: 'Frys', kontor: 'Kontor', diverse: 'Diverse' };
        document.getElementById('title').innerText = `${titles[tab]} ${emojis[tab]}`;
        document.getElementById('active-list-header').innerText = tab === 'frys' ? 'Dette er i frysen' : 'Dette skal vi ha';
        clearSearchInput();
    }

    function suggestCategory() {
        if (currentTab !== 'handling') return;
        const val = document.getElementById('newItemInput').value.toLowerCase().trim();
        const container = document.getElementById('category-selector-container');
        if (val.length > 1) {
            container.style.display = 'block';
            for (let key in kategoriMap) {
                if (val.includes(key)) { document.getElementById('newCategorySelect').value = kategoriMap[key]; break; }
            }
        } else { container.style.display = 'none'; }
    }

    function handleSearchInput(e) {
        document.getElementById('clearSearch').style.display = e.target.value.length > 0 ? 'block' : 'none';
        render();
    }

    function clearSearchInput() {
        document.getElementById('searchInput').value = "";
        document.getElementById('clearSearch').style.display = 'none';
        render();
    }

    function toggleAdmin() { 
        const panel = document.getElementById('admin-panel');
        panel.classList.toggle('open'); 
        if(panel.classList.contains('open')) {
            const dbKey = getDbKey();
            document.getElementById('importArea').value = database[dbKey].map(v => `${v.navn}${v.kategori ? ' | ' + v.kategori : ''}`).join('\n');
        }
    }

    function handleKeyPress(e) { if (e.key === 'Enter') { leggTilNyVare(); document.activeElement.blur(); } }

    function getDatoStreng() {
        const d = new Date();
        const mnd = ["jan", "feb", "mar", "apr", "mai", "jun", "jul", "aug", "sep", "okt", "nov", "des"];
        return `${d.getDate()}. ${mnd[d.getMonth()]}`;
    }

    function leggTilNyVare() {
        const input = document.getElementById('newItemInput');
        const navn = input.value.trim();
        if (!navn) return;
        const dbKey = getDbKey();
        const valgtKategori = currentTab === 'handling' ? document.getElementById('newCategorySelect').value : null;
        let dbVare = database[dbKey].find(v => v.navn.toLowerCase() === navn.toLowerCase());
        if (!dbVare) {
            dbVare = { navn: navn, kategori: valgtKategori };
            database[dbKey].push(dbVare);
            database[dbKey].sort((a, b) => a.navn.localeCompare(b.navn, 'nb'));
        } else if (valgtKategori) { dbVare.kategori = valgtKategori; }
        if (!activeItems[currentTab].some(v => v.navn.toLowerCase() === navn.toLowerCase())) {
            activeItems[currentTab].push({ navn: dbVare.navn, mengde: currentTab === 'frys' ? getDatoStreng() : "", kategori: dbVare.kategori });
        }
        input.value = ""; render(); saveData();
    }

    function slettFraBibliotek(navn) {
        const dbKey = getDbKey();
        database[dbKey] = database[dbKey].filter(v => v.navn !== navn);
        saveData(); render();
    }

    function addToActive(navn) {
        const dbKey = getDbKey();
        const dbVare = database[dbKey].find(v => v.navn === navn);
        if (!activeItems[currentTab].some(v => v.navn === navn)) {
            activeItems[currentTab].push({ navn: navn, mengde: currentTab === 'frys' ? getDatoStreng() : "", kategori: dbVare ? dbVare.kategori : null });
            saveData(); render();
        }
    }

    function removeFromActive(index) { activeItems[currentTab].splice(index, 1); saveData(); render(); }
    function updateQuantity(index, val) { activeItems[currentTab][index].mengde = val; saveData(); }
    function clearActiveList() { if(confirm("Tømme listen?")) { activeItems[currentTab] = []; saveData(); render(); } }

    // LONG PRESS LOGIKK
    let longPressTimer;
    let selectedItemForCat = null;

    function startLongPress(navn) {
        longPressTimer = setTimeout(() => {
            openCatModal(navn);
        }, 600);
    }

    function cancelLongPress() {
        clearTimeout(longPressTimer);
    }

    function openCatModal(navn) {
        selectedItemForCat = navn;
        document.getElementById('catModal').style.display = 'flex';
    }

    function closeCatModal() {
        document.getElementById('catModal').style.display = 'none';
        selectedItemForCat = null;
    }

    function updateItemCategory(newCat) {
        if (!selectedItemForCat) return;
        const dbKey = getDbKey();
        const item = database[dbKey].find(v => v.navn === selectedItemForCat);
        if (item) {
            item.kategori = newCat;
            // Oppdater også i aktiv liste hvis den finnes der
            activeItems[currentTab].forEach(ai => {
                if (ai.navn === selectedItemForCat) ai.kategori = newCat;
            });
            saveData();
            render();
        }
        closeCatModal();
    }

    function importerListe() {
        const input = document.getElementById('importArea').value;
        const dbKey = getDbKey();
        database[dbKey] = input.split('\n').filter(l => l.trim()).map(l => {
            const p = l.split('|');
            return { navn: p[0].trim(), kategori: p[1] ? p[1].trim() : (currentTab === 'handling' ? "Diverse" : null) };
        });
        database[dbKey].sort((a, b) => a.navn.localeCompare(b.navn, 'nb'));
        saveData(); render();
    }

    // SWIPE LOGIKK
    let touchStartX = 0;
    let currentSwipedElement = null;

    function handleTouchStart(e, content, navn) {
        if (currentSwipedElement && currentSwipedElement !== content) { currentSwipedElement.style.transform = 'translateX(0px)'; }
        touchStartX = e.touches[0].clientX;
        currentSwipedElement = content;
        content.style.transition = 'none';
        startLongPress(navn);
    }

    function handleTouchMove(e, content) {
        let diff = e.touches[0].clientX - touchStartX;
        if (Math.abs(diff) > 10) cancelLongPress(); // Avbryt longpress hvis man begynner å swipe
        if (diff < 0) diff = 0;
        if (diff > 80) diff = 80;
        content.style.transform = `translateX(${diff}px)`;
    }

    function handleTouchEnd(e, content, navn) {
        cancelLongPress();
        content.style.transition = 'transform 0.2s ease-out';
        let diff = e.changedTouches[0].clientX - touchStartX;
        if (diff > 40) { content.style.transform = 'translateX(80px)'; } 
        else { 
            content.style.transform = 'translateX(0px)';
            if (Math.abs(diff) < 5) addToActive(navn);
        }
    }

    function render() {
        const activeDiv = document.getElementById('activeList');
        const libraryDiv = document.getElementById('libraryList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const dbKey = getDbKey();
        const currentActive = [...activeItems[currentTab]];

        // Sorter aktiv liste basert på kategori (kun i handling)
        if (currentTab === 'handling') {
            currentActive.sort((a, b) => {
                const catA = a.kategori || "Diverse", catB = b.kategori || "Diverse";
                const indexA = kategorier.indexOf(catA);
                const indexB = kategorier.indexOf(catB);
                if (indexA !== indexB) return indexA - indexB;
                return a.navn.localeCompare(b.navn, 'nb');
            });
        }

        let activeHtml = ""; let lastCat = null;
        if (currentActive.length === 0) activeHtml = '<div style="padding:20px; text-align:center; color:gray; font-size:12px;">Ingen aktive varer</div>';
        currentActive.forEach(v => {
            if (currentTab === 'handling' && (v.kategori || "Diverse") !== lastCat) {
                lastCat = v.kategori || "Diverse";
                activeHtml += `<div class="category-header">${lastCat}</div>`;
            }
            const origIdx = activeItems[currentTab].findIndex(item => item.navn === v.navn);
            activeHtml += `
                <div class="swipe-content item-active" style="border-bottom: 0.5px solid var(--divider)" onclick="removeFromActive(${origIdx})">
                    <div style="flex:1">⭐ ${v.navn}</div>
                    <div onclick="event.stopPropagation()">
                        <input type="text" class="qty-input" placeholder="${currentTab === 'frys' ? 'Dato' : 'Mengde'}" value="${v.mengde || ''}" oninput="updateQuantity(${origIdx}, this.value)" inputmode="text">
                    </div>
                </div>`;
        });
        activeDiv.innerHTML = activeHtml;

        const filteredLib = database[dbKey].filter(v => v.navn.toLowerCase().includes(search) && !activeItems[currentTab].some(a => a.navn === v.navn));
        libraryDiv.innerHTML = "";
        filteredLib.forEach(v => {
            const container = document.createElement('div'); container.className = 'swipe-container';
            const delBtn = document.createElement('div'); delBtn.className = 'delete-btn-ios'; delBtn.innerText = 'SLETT';
            delBtn.onclick = (e) => { e.stopPropagation(); slettFraBibliotek(v.navn); };
            
            const content = document.createElement('div'); content.className = 'swipe-content';
            content.innerHTML = `
                <div style="display:flex; flex-direction:column; overflow:hidden;">
                    <span style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap">+ ${v.navn}</span>
                    <span style="font-size:8px; color:var(--secondary-text)">${v.kategori || 'Ingen kat.'}</span>
                </div>
                <span style="color:var(--primary)">⊕</span>`;
            
            content.ontouchstart = (e) => handleTouchStart(e, content, v.navn);
            content.ontouchmove = (e) => handleTouchMove(e, content);
            content.ontouchend = (e) => handleTouchEnd(e, content, v.navn);
            content.onmousedown = () => startLongPress(v.navn); // For desktop-testing
            content.onmouseup = () => cancelLongPress();
            content.onmouseleave = () => cancelLongPress();
            
            content.onclick = () => { if (content.style.transform === 'translateX(80px)') content.style.transform = 'translateX(0px)'; else addToActive(v.navn); };
            
            container.appendChild(delBtn); container.appendChild(content); libraryDiv.appendChild(container);
        });
    }

    init();
</script>
</body>
</html>
