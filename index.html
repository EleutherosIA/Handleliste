<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS Web App Innstillinger -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Min Liste">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3737/3737372.png">

    <title>Kompakt Handleliste - Smart Sortering</title>
    
    <style>
        /* Fargetemaer */
        :root {
            --bg: #f9f7f2;
            --card: #ffffff;
            --text: #2c2c2c;
            --secondary-text: #7c7c7c;
            --primary: #4a7c59; 
            --red: #d9534f;
            --divider: #e8e4d9;
            --input-bg: #f0ede4;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2c2c2c;
            --text: #f0f0f0;
            --secondary-text: #a0a0a0;
            --primary: #6ab04c;
            --red: #ff5e57;
            --divider: #3d3d3d;
            --input-bg: #3d3d3d;
        }

        [data-theme="pink"] {
            --bg: #fff0f5;
            --card: #ffffff;
            --text: #5d3f4b;
            --secondary-text: #a0818f;
            --primary: #d63384;
            --red: #ff4d6d;
            --divider: #f8d7da;
            --input-bg: #ffe4ed;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            color: var(--text);
            transition: background-color 0.3s ease;
        }

        header { 
            background: var(--card); 
            padding-top: env(safe-area-inset-top, 20px);
            padding-left: 15px; padding-right: 15px; padding-bottom: 12px;
            border-bottom: 1px solid var(--divider); 
            display: flex; justify-content: space-between; align-items: center; 
            flex-shrink: 0;
        }

        .top-controls { 
            background: var(--card); 
            padding: 10px 12px; 
            border-bottom: 1px solid var(--divider); 
            display: flex; flex-direction: column; gap: 8px; 
        }

        .input-group { display: flex; gap: 6px; position: relative; }

        input, select { 
            padding: 10px 12px; border-radius: 12px; border: none; 
            background: var(--input-bg); font-size: 14px; color: var(--text);
            outline: none;
        }

        input { flex: 1; }

        .category-select-mini {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            background: var(--input-bg);
            border: 1px solid var(--divider);
            color: var(--secondary-text);
            margin-bottom: 4px;
        }

        .search-container { position: relative; display: flex; align-items: center; }
        
        .clear-btn {
            position: absolute;
            right: 12px;
            font-size: 14px;
            color: var(--secondary-text);
            cursor: pointer;
            display: none; 
            padding: 5px;
            user-select: none;
        }

        .add-btn { 
            background: var(--primary); color: white; border: none; 
            border-radius: 12px; padding: 0 15px; font-weight: 600; font-size: 13px;
        }

        main { flex: 1; overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }

        h2 { 
            font-size: 11px; color: var(--secondary-text); text-transform: uppercase; 
            letter-spacing: 0.8px; margin: 12px 0 6px 4px; 
        }

        .category-header {
            font-size: 10px;
            font-weight: 700;
            color: var(--primary);
            padding: 8px 12px 4px 12px;
            background: var(--bg);
            text-transform: uppercase;
        }

        .list-container { 
            background: var(--card); border-radius: 14px; overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 15px;
        }

        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: var(--card); font-size: 14px;
        }

        #activeList .item { border-bottom: 0.5px solid var(--divider); cursor: pointer; }
        .item:active { background-color: var(--input-bg); }
        .item-active { color: var(--primary); font-weight: 600; }

        .qty-input {
            width: 75px; /* Litt bredere for tekst som "500g" */
            padding: 6px 4px;
            border-radius: 8px;
            border: 1px solid var(--divider);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            text-align: center;
            margin-right: 4px;
            font-weight: 500;
        }

        #libraryList {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
            background: var(--divider); border: 0.5px solid var(--divider);
        }

        nav { 
            background: var(--card); border-top: 1px solid var(--divider); 
            display: flex; justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom, 15px); padding-top: 10px;
        }

        .nav-btn { 
            border: none; background: none; font-size: 9px; color: var(--secondary-text); 
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; 
        }

        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 20px; }

        #admin-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: var(--bg); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            padding: 20px; box-sizing: border-box; z-index: 100; 
            border-top: 1px solid var(--divider); border-radius: 20px 20px 0 0; 
            display: flex; flex-direction: column;
        }
        #admin-panel.open { bottom: 0; }

        textarea { 
            width: 100%; flex: 1; margin-bottom: 15px; padding: 15px; border: none; 
            border-radius: 14px; font-size: 14px; background: var(--card); color: var(--text);
        }

        .btn { padding: 15px; border-radius: 14px; border: none; width: 100%; font-weight: 600; font-size: 15px; cursor: pointer; margin-bottom: 10px;}
        .vask-btn { background: var(--primary); color: white; }
        .lukk-btn { background: var(--divider); color: var(--text); }
    </style>
</head>
<body data-theme="classic">

<header>
    <h1 id="title" style="margin:0; font-size: 18px; font-weight: 800; letter-spacing: -0.5px;">Handling 🛒</h1>
    <div onclick="toggleAdmin()" style="font-size: 22px; cursor: pointer;">🎨</div>
</header>

<div class="top-controls">
    <div id="add-section">
        <div class="input-group">
            <input type="text" id="newItemInput" placeholder="Hva mangler?" onkeypress="handleKeyPress(event)" oninput="suggestCategory()" inputmode="text">
            <button class="add-btn" onclick="leggTilNyVare()">Legg til</button>
        </div>
        <div id="category-selector-container" style="display:none; margin-top: 4px;">
            <select id="newCategorySelect" class="category-select-mini">
                <!-- Fylles av JS -->
            </select>
            <span style="font-size: 10px; color: var(--secondary-text); margin-left: 5px;">Kategori</span>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Søk i bibliotek..." onkeyup="handleSearchInput(event)" inputmode="search">
        <span id="clearSearch" class="clear-btn" onclick="clearSearchInput()">✕</span>
    </div>
</div>

<main>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="active-list-header">Dette skal vi ha</h2>
        <button onclick="clearActiveList()" style="background:none; border:none; color:var(--red); font-size: 10px; cursor:pointer;">Tøm fane</button>
    </div>
    <div id="activeList" class="list-container"></div>
    
    <h2>Velg fra biblioteket</h2>
    <div id="libraryList" class="list-container"></div>
</main>

<nav>
    <button id="btn-handling" class="nav-btn active" onclick="switchTab('handling')">
        <span class="nav-icon">🛒</span><span>Handle</span>
    </button>
    <button id="btn-frys" class="nav-btn" onclick="switchTab('frys')">
        <span class="nav-icon">❄️</span><span>Frys</span>
    </button>
    <button id="btn-kontor" class="nav-btn" onclick="switchTab('kontor')">
        <span class="nav-icon">📎</span><span>Kontor</span>
    </button>
    <button id="btn-diverse" class="nav-btn" onclick="switchTab('diverse')">
        <span class="nav-icon">🛍️</span><span>Diverse</span>
    </button>
</nav>

<div id="admin-panel">
    <h3 style="margin-top:0; font-size: 18px;">Velg tema</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <div style="width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; background: #4a7c59;" onclick="setTheme('classic')"></div>
        <div style="width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; background: #2c2c2c;" onclick="setTheme('dark')"></div>
        <div style="width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; background: #d63384;" onclick="setTheme('pink')"></div>
    </div>

    <h3 style="font-size: 18px;">Rediger bibliotek</h3>
    <p style="font-size: 12px; color: var(--secondary-text);">Format: Varennavn | Kategori (valgfritt)</p>
    <textarea id="importArea"></textarea>
    <div class="btn-group">
        <button class="btn vask-btn" onclick="importerListe()">Lagre endringer</button>
        <button class="btn lukk-btn" onclick="toggleAdmin()">Ferdig</button>
    </div>
</div>

<script>
    let currentTab = 'handling';
    let database = JSON.parse(localStorage.getItem('sh_database')) || { hjem: [], frys: [], kontor: [], diverse: [] };
    let activeItems = JSON.parse(localStorage.getItem('sh_active')) || { handling: [], frys: [], kontor: [], diverse: [] };
    let currentTheme = localStorage.getItem('sh_theme') || 'classic';

    const kategorier = [
        "Frukt & Grønt",
        "Kjøtt & Fisk",
        "Meieriprodukter",
        "Drikke",
        "Bakevarer",
        "Hermetikk & Tørrvarer",
        "Frysevarer",
        "Diverse"
    ];

    const kategoriMap = {
        "melk": "Meieriprodukter", "ost": "Meieriprodukter", "smør": "Meieriprodukter", "yoghurt": "Meieriprodukter", "fløte": "Meieriprodukter",
        "eple": "Frukt & Grønt", "banan": "Frukt & Grønt", "agurk": "Frukt & Grønt", "tomat": "Frukt & Grønt", "løk": "Frukt & Grønt", "gulrot": "Frukt & Grønt",
        "brød": "Bakevarer", "rundstykker": "Bakevarer", "knekkebrød": "Bakevarer", "mel": "Bakevarer", "gjær": "Bakevarer",
        "kjøttdeig": "Kjøtt & Fisk", "kylling": "Kjøtt & Fisk", "laks": "Kjøtt & Fisk", "pølser": "Kjøtt & Fisk", "skinke": "Kjøtt & Fisk",
        "brus": "Drikke", "juice": "Drikke", "vann": "Drikke", "kaffe": "Drikke", "te": "Drikke",
        "pasta": "Hermetikk & Tørrvarer", "ris": "Hermetikk & Tørrvarer", "boks": "Hermetikk & Tørrvarer", "suppe": "Hermetikk & Tørrvarer"
    };

    // Fyll kategori-dropdown
    const catSelect = document.getElementById('newCategorySelect');
    kategorier.forEach(cat => {
        let opt = document.createElement('option');
        opt.value = cat;
        opt.innerHTML = cat;
        catSelect.appendChild(opt);
    });

    if (database.frys.length === 0 && database.hjem.length > 0) {
        database.frys = [...database.hjem];
        saveData();
    }

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        currentTheme = theme;
        localStorage.setItem('sh_theme', theme);
    }
    setTheme(currentTheme);

    function saveData() {
        localStorage.setItem('sh_database', JSON.stringify(database));
        localStorage.setItem('sh_active', JSON.stringify(activeItems));
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        
        const emojis = { handling: '🛒', frys: '❄️', kontor: '📎', diverse: '🛍️' };
        const titles = { handling: 'Handling', frys: 'Frys', kontor: 'Kontor', diverse: 'Diverse' };
        document.getElementById('title').innerText = `${titles[tab]} ${emojis[tab]}`;
        document.getElementById('active-list-header').innerText = tab === 'frys' ? 'Dette er i frysen' : 'Dette skal vi ha';
        
        // Skjul kategorivelger hvis vi ikke er i handling
        document.getElementById('category-selector-container').style.display = 'none';
        
        clearSearchInput();
        render();
    }

    function suggestCategory() {
        if (currentTab !== 'handling') return;
        const val = document.getElementById('newItemInput').value.toLowerCase().trim();
        const container = document.getElementById('category-selector-container');
        
        if (val.length > 1) {
            container.style.display = 'block';
            for (let key in kategoriMap) {
                if (val.includes(key)) {
                    document.getElementById('newCategorySelect').value = kategoriMap[key];
                    break;
                }
            }
        } else {
            container.style.display = 'none';
        }
    }

    function handleSearchInput(e) {
        const input = document.getElementById('searchInput');
        document.getElementById('clearSearch').style.display = input.value.length > 0 ? 'block' : 'none';
        render();
    }

    function clearSearchInput() {
        const input = document.getElementById('searchInput');
        input.value = "";
        document.getElementById('clearSearch').style.display = 'none';
        render();
    }

    function toggleAdmin() { 
        const panel = document.getElementById('admin-panel');
        panel.classList.toggle('open'); 
        if(panel.classList.contains('open')) {
            const dbKey = getDbKey();
            document.getElementById('importArea').value = database[dbKey].map(v => `${v.navn}${v.kategori ? ' | ' + v.kategori : ''}`).join('\n');
        }
    }

    function getDbKey() {
        if (currentTab === 'frys') return 'frys';
        if (currentTab === 'kontor') return 'kontor';
        if (currentTab === 'diverse') return 'diverse';
        return 'hjem';
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            leggTilNyVare();
            document.activeElement.blur();
        }
    }

    function getDatoStreng() {
        const d = new Date();
        const mnd = ["jan", "feb", "mar", "apr", "mai", "jun", "jul", "aug", "sep", "okt", "nov", "des"];
        return `${d.getDate()}. ${mnd[d.getMonth()]}`;
    }

    function leggTilNyVare() {
        const input = document.getElementById('newItemInput');
        const navn = input.value.trim();
        if (navn === "") return;
        
        const dbKey = getDbKey();
        const valgtKategori = currentTab === 'handling' ? document.getElementById('newCategorySelect').value : null;
        
        // Finn eller opprett i database
        let dbVare = database[dbKey].find(v => v.navn.toLowerCase() === navn.toLowerCase());
        if (!dbVare) {
            dbVare = { navn: navn, kategori: valgtKategori };
            database[dbKey].push(dbVare);
            database[dbKey].sort((a, b) => a.navn.localeCompare(b.navn, 'nb'));
        } else if (valgtKategori) {
            dbVare.kategori = valgtKategori; // Oppdater kategori hvis endret
        }
        
        if (!activeItems[currentTab].some(v => v.navn.toLowerCase() === navn.toLowerCase())) {
            const mengde = currentTab === 'frys' ? getDatoStreng() : "";
            activeItems[currentTab].push({ navn: dbVare.navn, mengde: mengde, kategori: dbVare.kategori });
        }
        
        input.value = "";
        document.getElementById('category-selector-container').style.display = 'none';
        saveData();
        render();
    }

    function importerListe() {
        const input = document.getElementById('importArea').value;
        const lines = input.split('\n').filter(l => l.trim() !== "");
        const dbKey = getDbKey();
        
        database[dbKey] = lines.map(l => {
            const parts = l.split('|');
            return { 
                navn: parts[0].trim(), 
                kategori: parts[1] ? parts[1].trim() : (currentTab === 'handling' ? "Diverse" : null)
            };
        });
        database[dbKey].sort((a, b) => a.navn.localeCompare(b.navn, 'nb'));
        saveData();
        render();
    }

    function addToActive(navn) {
        const dbKey = getDbKey();
        const dbVare = database[dbKey].find(v => v.navn === navn);
        const mengde = currentTab === 'frys' ? getDatoStreng() : "";
        
        activeItems[currentTab].push({ 
            navn: navn, 
            mengde: mengde, 
            kategori: dbVare ? dbVare.kategori : (currentTab === 'handling' ? "Diverse" : null) 
        });
        saveData();
        render();
    }

    function updateQuantity(index, value) {
        activeItems[currentTab][index].mengde = value;
        saveData();
    }

    function removeFromActive(index) {
        activeItems[currentTab].splice(index, 1);
        saveData();
        render();
    }

    function clearActiveList() {
        if(confirm("Tømme listen?")) {
            activeItems[currentTab] = [];
            saveData();
            render();
        }
    }

    function render() {
        const activeDiv = document.getElementById('activeList');
        const libraryDiv = document.getElementById('libraryList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const dbKey = getDbKey();
        const db = database[dbKey];
        const currentActive = [...activeItems[currentTab]];

        // Sortering for Aktiv Liste
        if (currentTab === 'handling') {
            // Sorter etter kategori først, så navn
            currentActive.sort((a, b) => {
                const catA = a.kategori || "Diverse";
                const catB = b.kategori || "Diverse";
                if (catA !== catB) return kategorier.indexOf(catA) - kategorier.indexOf(catB);
                return a.navn.localeCompare(b.navn, 'nb');
            });
        }

        let activeHtml = "";
        let lastCat = null;

        if (currentActive.length === 0) {
            activeHtml = '<div style="padding:15px; color:var(--secondary-text); font-size:12px; text-align:center;">Listen er tom</div>';
        } else {
            currentActive.forEach((v) => {
                // Legg til kategori-overskrift i handlelisten
                if (currentTab === 'handling' && (v.kategori || "Diverse") !== lastCat) {
                    lastCat = v.kategori || "Diverse";
                    activeHtml += `<div class="category-header">${lastCat}</div>`;
                }
                
                // Finn original index for sletting (siden vi sorterte kopien)
                const origIdx = activeItems[currentTab].findIndex(item => item.navn === v.navn);

                activeHtml += `
                    <div class="item item-active" onclick="removeFromActive(${origIdx})">
                        <div style="display: flex; align-items: center; flex: 1;">
                            <span style="margin-right: 10px;">⭐</span>
                            <span style="word-break: break-word; padding-right: 5px;">${v.navn}</span>
                        </div>
                        <div style="display: flex; align-items: center;" onclick="event.stopPropagation()">
                            <input type="text" 
                                   class="qty-input" 
                                   placeholder="${currentTab === 'frys' ? 'Dato' : 'Mengde'}" 
                                   value="${v.mengde || ''}" 
                                   oninput="updateQuantity(${origIdx}, this.value)"
                                   onkeypress="if(event.key==='Enter') this.blur()">
                        </div>
                    </div>
                `;
            });
        }
        activeDiv.innerHTML = activeHtml;

        const filteredLibrary = db.filter(v => {
            const matchesSearch = v.navn.toLowerCase().includes(search);
            const isAlreadyInTab = activeItems[currentTab].some(active => active.navn === v.navn);
            return matchesSearch && !isAlreadyInTab;
        });

        libraryDiv.innerHTML = filteredLibrary.length ? filteredLibrary.map(v => `
            <div class="item" onclick="addToActive('${v.navn.replace(/'/g, "\\'")}')">
                <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;">+ ${v.navn}</span>
                <span style="color: var(--primary); font-size: 16px;">⊕</span>
            </div>
        `).join('') : '<div style="padding:15px; color:var(--secondary-text); font-size:12px; text-align:center; grid-column: 1/3;">Fant ingenting</div>';
    }

    render();
</script>

</body>
</html>
